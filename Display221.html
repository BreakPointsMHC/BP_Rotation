<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation Test</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Beat_the_stat/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Cat_Breaking_Box/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/whiteboard/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/basketball/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Magnetic_Ball/index.html",
  ];

  const FIRST_DURATION = 15 * 1000;     // 15 seconds
  const ROTATION_INTERVAL = 15 * 1000;  // 15 seconds

  const iframe = document.getElementById("projectFrame");
  let currentIndex = 0;

  function startRotation() {
    setTimeout(() => {
      currentIndex = 1;
      iframe.src = projects[currentIndex];

      setInterval(() => {
        currentIndex = (currentIndex + 1) % projects.length;
        iframe.src = projects[currentIndex];
      }, ROTATION_INTERVAL);

    }, FIRST_DURATION);
  }

  // wait for first project to load before starting timer
  iframe.onload = () => {
    if (currentIndex === 0) {
      startRotation();
    }
  };

  // load first project
  iframe.src = projects[0];

</script>

</body>
</html>
