<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Galaxy/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Water/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/blobby/index.html"
  ];

  const FIRST_PROJECT_DELAY = 5000; // 5 seconds
  const ROTATION_INTERVAL = 60 * 1000; // 1 minute
  let currentIndex = 0;

  const iframe = document.getElementById("projectFrame");

  // Step 1: Load first project for 5 seconds
  iframe.src = projects[0];

  setTimeout(() => {
    // Step 2: start rotation from second project
    currentIndex = 1;
    iframe.src = projects[currentIndex];

    setInterval(() => {
      currentIndex = (currentIndex + 1) % projects.length;
      iframe.src = projects[currentIndex];
    }, ROTATION_INTERVAL);
  }, FIRST_PROJECT_DELAY);
</script>

</body>
</html>
