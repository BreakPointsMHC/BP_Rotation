<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  // LIST OF PROJECTS FOR DISPLAY 221 (use /embed/ links for interactivity)
  const projects = [
    "https://editor.p5js.org/breakpoints.mhc/embed/qVbi5pAhr",
    "https://editor.p5js.org/breakpoints.mhc/embed/ywW4RihaT",
    "https://editor.p5js.org/breakpoints.mhc/embed/OdK3eB3nW"
  ];

  // 1 MINUTE in milliseconds (for testing)
  const ONE_MINUTE = 60 * 1000;

  function getCurrentProjectIndex() {
    const startDate = new Date("2026-01-01"); // rotation start date
    const now = new Date();

    const minutes = Math.floor((now - startDate) / ONE_MINUTE);
    return minutes % projects.length;
  }

  function loadProject() {
    const index = getCurrentProjectIndex();
    document.getElementById("projectFrame").src = projects[index];
  }

  loadProject();
  setInterval(loadProject, ONE_MINUTE); // reload every minute
</script>

</body>
</html>
