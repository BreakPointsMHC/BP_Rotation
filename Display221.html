<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  // List of projects for Display 221 (use /embed/ links for interactivity)
  const projects = [
    "https://editor.p5js.org/breakpoints.mhc/embed/qVbi5pAhr",
    "https://editor.p5js.org/breakpoints.mhc/embed/ywW4RihaT",
    "https://editor.p5js.org/breakpoints.mhc/embed/OdK3eB3nW"
  ];

  const ONE_MINUTE = 60 * 1000; // testing interval
  let currentIndex = 0; // keeps track of which project to show

  // Load the current project in the iframe and update index
  function loadProject() {
    document.getElementById("projectFrame").src = projects[currentIndex];
    currentIndex = (currentIndex + 1) % projects.length; // cycle back to first project
  }

  loadProject(); // initial load
  setInterval(loadProject, ONE_MINUTE); // rotate every minute
</script>

</body>
</html>
