<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Galaxy_2026_03_27_22_40_58/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Water_effect_with_Sound_2026_03_27_22_41_20/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/blobby_virus_copy_2026_03_27_22_39_47/index.html"
  ];

  const ONE_MINUTE = 60 * 1000;
  let currentIndex = 0;

  function loadProject() {
    document.getElementById("projectFrame").src = projects[currentIndex];
    currentIndex = (currentIndex + 1) % projects.length;
  }

  loadProject();
  setInterval(loadProject, ONE_MINUTE);
</script>

</body>
</html>
