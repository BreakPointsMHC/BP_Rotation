<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* hidden iframes for preloading */
    .preload {
      display: none;
    }
  </style>
</head>
<body>

<!-- visible iframe -->
<iframe id="projectFrame"></iframe>

<!-- hidden iframes to preload all projects -->
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Galaxy/index.html" class="preload"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Water/index.html" class="preload"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/blobby/index.html" class="preload"></iframe>

<script>
  // list of project URLs
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Galaxy/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Water/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/blobby/index.html"
  ];

  const ONE_MINUTE = 60 * 1000; // rotation interval (change for testing)
  let currentIndex = 0;

  function loadProject() {
    document.getElementById("projectFrame").src = projects[currentIndex];
    currentIndex = (currentIndex + 1) % projects.length;
  }

  // first load
  loadProject();

  // rotate every interval
  setInterval(loadProject, ONE_MINUTE);
</script>

</body>
</html>
