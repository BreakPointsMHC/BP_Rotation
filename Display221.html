<!DOCTYPE html>
<html>
<head>
  <title>Display 221 Rotation</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://editor.p5js.org/breakpoints.mhc/embed/qVbi5pAhr",
    "https://editor.p5js.org/breakpoints.mhc/embed/ywW4RihaT",
    "https://editor.p5js.org/breakpoints.mhc/embed/OdK3eB3nW"
  ];

  const ONE_MINUTE = 60 * 1000;

  let currentIndex = -1; // track current project

  function getCurrentProjectIndex() {
    const startDate = new Date("2026-01-01");
    const now = new Date();
    const minutes = Math.floor((now - startDate) / ONE_MINUTE);

    return ((minutes % projects.length) + projects.length) % projects.length;
  }

  function checkAndUpdateProject() {
    const newIndex = getCurrentProjectIndex();

    // ONLY update if project actually changed
    if (newIndex !== currentIndex) {
      currentIndex = newIndex;
      document.getElementById("projectFrame").src = projects[currentIndex];
    }
  }

  // initial load
  checkAndUpdateProject();

  // check every 5 seconds (NOT reload every time)
  setInterval(checkAndUpdateProject, 5000);
</script>

</body>
</html>
