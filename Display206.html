<!DOCTYPE html>
<html>
<head>
  <title>Display 206 Rotation Test</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Galaxy/index.html", // dummy project
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Catch-a-pet/index.html",  
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/weather/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/elephant/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/blobby/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Beechy_keen/index.html",
  ];

  const firstDuration = 30 * 1000;       // 30 seconds for dummy project
  const rotationInterval = 15 * 1000;    // 15 seconds for the remaining projects

  const iframe = document.getElementById("projectFrame");
  let currentIndex = 0;

  // Step 1: Show dummy project first
  iframe.src = projects[currentIndex];

  // Step 2: After 30 seconds, switch to second project
  setTimeout(() => {
    currentIndex = 1;
    iframe.src = projects[currentIndex];

    // Step 3: Start rotating remaining projects every 15 seconds
    setInterval(() => {
      currentIndex = (currentIndex + 1) % projects.length;
      iframe.src = projects[currentIndex];
    }, rotationInterval);

  }, firstDuration);

</script>

</body>
</html>
