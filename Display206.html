<!DOCTYPE html>
<html>
<head>
  <title>Display 206 Rotation Test</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Galaxy/index.html",  // first project
    "https://breakpointsmhc.github.io/BP_Rotation/Water/index.html",   // second project
    "https://breakpointsmhc.github.io/BP_Rotation/blobby/index.html"   // third project
  ];

  const firstDuration = 1 * 60 * 1000; // 1 minute
  const secondDuration = 2 * 60 * 1000; // 2 minutes
  const rotationInterval = 2 * 60 * 1000; // after second project, continue rotating every 2 minutes

  const iframe = document.getElementById("projectFrame");

  let currentIndex = 0;

  // Step 1: Load first project
  iframe.src = projects[currentIndex];

  // Step 2: After 1 minute, switch to second project
  setTimeout(() => {
    currentIndex = 1;
    iframe.src = projects[currentIndex];

    // Step 3: After 2 minutes, start automatic rotation of all projects
    setTimeout(() => {
      currentIndex = 2; // move to third project
      iframe.src = projects[currentIndex];

      setInterval(() => {
        currentIndex = (currentIndex + 1) % projects.length;
        iframe.src = projects[currentIndex];
      }, rotationInterval);

    }, secondDuration);

  }, firstDuration);

</script>

</body>
</html>
