<!DOCTYPE html>
<html>
<head>
  <title>Display Rotation Stable</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>

<iframe id="frameA"></iframe>
<iframe id="frameB"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Catch-a-pet/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/weather/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/elephant/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/blobby/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Beechy_keen/index.html",
  ];

  const FIRST_DURATION = 30 * 1000;
  const ROTATION_INTERVAL = 30 * 1000;

  const frameA = document.getElementById("frameA");
  const frameB = document.getElementById("frameB");

  let currentIndex = 0;
  let showingA = true;

  function showFrame(index) {
    if (showingA) {
      frameB.src = projects[index];   // load next
      frameB.style.zIndex = 2;
      frameA.style.zIndex = 1;
    } else {
      frameA.src = projects[index];
      frameA.style.zIndex = 2;
      frameB.style.zIndex = 1;
    }
    showingA = !showingA;
  }

  // Start with first (dummy)
  frameA.src = projects[0];

  // After dummy duration
  setTimeout(() => {
    currentIndex = 1;
    showFrame(currentIndex);

    setInterval(() => {
      currentIndex = (currentIndex + 1) % projects.length;
      showFrame(currentIndex);
    }, ROTATION_INTERVAL);

  }, FIRST_DURATION);

</script>

</body>
</html>
