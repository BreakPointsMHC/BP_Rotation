<!DOCTYPE html>
<html>
<head>
  <title>Display Rotation Smooth</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
      top: 0;
      left: 0;
      display: none;
    }
    iframe.active {
      display: block;
    }
  </style>
</head>
<body>

<!-- Preload ALL projects -->
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Projects/Catch-a-pet/index.html"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Projects/weather/index.html"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Projects/elephant/index.html"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Projects/blobby/index.html"></iframe>
<iframe src="https://breakpointsmhc.github.io/BP_Rotation/Projects/Beechy_keen/index.html"></iframe>

<script>
  const iframes = document.querySelectorAll("iframe");

  const FIRST_DURATION = 30 * 1000;    // 30 sec (dummy)
  const ROTATION_INTERVAL = 30 * 1000; // 30 sec (others)

  let currentIndex = 0;

  function showProject(index) {
    iframes.forEach(frame => frame.classList.remove("active"));
    iframes[index].classList.add("active");
  }

  // Show first (dummy)
  showProject(0);

  // After 30s → go to second
  setTimeout(() => {
    currentIndex = 1;
    showProject(currentIndex);

    // Rotate smoothly
    setInterval(() => {
      currentIndex = (currentIndex + 1) % iframes.length;
      showProject(currentIndex);
    }, ROTATION_INTERVAL);

  }, FIRST_DURATION);

</script>

</body>
</html>
