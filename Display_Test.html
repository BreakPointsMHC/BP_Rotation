<!DOCTYPE html>
<html>
<head>
  <title>Display Rotation Test</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Catch-a-pet/index.html",  // first dummy project
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/weather/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/elephant/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/blobby/index.html",
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Beechy_keen/index.html",
  ];

  const FIRST_DURATION = 30 * 1000;    // 30 sec (dummy)
  const ROTATION_INTERVAL = 30 * 1000; // 30 sec (all others)

  const iframe = document.getElementById("projectFrame");
  let currentIndex = 0;

  // Load first (dummy) project
  iframe.src = projects[currentIndex];

  // Start rotation after dummy duration
  setTimeout(() => {
    currentIndex = 1;
    iframe.src = projects[currentIndex];

    // Then rotate all remaining projects every ROTATION_INTERVAL
    setInterval(() => {
      currentIndex = (currentIndex + 1) % projects.length;
      iframe.src = projects[currentIndex];
    }, ROTATION_INTERVAL);

  }, FIRST_DURATION);

</script>

</body>
</html>
