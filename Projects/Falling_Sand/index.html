<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handpose Sandfall</title>
<!-- Load p5.js -->
   <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
   <!-- Load MediaPipe Hands -->
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="sketch.js"></script>  <!-- sketch.js loads after ml5.js -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #121212;
      color: #ffffff;
      text-align: center;
    }
    .header {
      position: absolute;
      top: 120px;
      left: 0;
      right: 0;
      z-index: 100;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0;
      padding: 10px 20px;
      background: rgba(0,0,0,0.7);
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    h2 {
      font-size: 1.5rem;
      margin: 0;
      padding: 10px 20px;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      border-radius: 8px;
      font-weight: normal;
      opacity: 0.9;
    }
/*     @keyframes glow {
      from {
        text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #e60073, 0 0 20px #e60073;
      }
      to {
        text-shadow: 0 0 10px #fff, 0 0 15px #ff4da6, 0 0 20px #ff4da6, 0 0 25px #ff4da6;
      }
    } */
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
  </head>
<body>
  <div class="header">
    <h1>Control Falling Ice Cubes With your hands!</h1>
    <h2>By Nafisa Bashar Anmul</h2>
  </div>
  <div id="canvas-container"></div>
  <script src="sketch.js"></script>
</body>
</html>
