 <!DOCTYPE html>
<html>
<head>
  <title>Display Floor Rotation Test</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<iframe id="projectFrame"></iframe>

<script>
  const projects = [
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Galaxy/index.html",  // dummy
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Water/index.html",   
    "https://breakpointsmhc.github.io/BP_Rotation/Projects/Falling_Sand/index.html",   
  ];

  const FIRST_DURATION = 30 * 1000;                // 30 seconds for dummy
  const ROTATION_INTERVAL = 24 * 60 * 60 * 1000;   // 1 day for other projects

  const iframe = document.getElementById("projectFrame");
  let currentIndex = 0;

  function startRotation() {
    // After 30s → go to second project
    setTimeout(() => {
      currentIndex = 1;
      iframe.src = projects[currentIndex];

      // Then rotate every 1 day
      setInterval(() => {
        currentIndex = (currentIndex + 1) % projects.length;
        iframe.src = projects[currentIndex];
      }, ROTATION_INTERVAL);

    }, FIRST_DURATION);
  }

  // Wait for first project to load before starting timer
  iframe.onload = () => {
    if (currentIndex === 0) {
      startRotation();
    }
  };

  // Load first (dummy) project
  iframe.src = projects[0];

</script>

</body>
</html>
